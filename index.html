<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        .hide { display: none !important; }
        .sidebar-btn { @apply flex flex-col items-center gap-2 w-full py-4 text-sm font-semibold text-indigo-300 hover:text-white hover:bg-white/10 transition-colors; }
        .sidebar-btn.active { @apply text-white border-l-4 border-white bg-white/10; }
        .note-item { @apply p-3 border-b border-slate-100 cursor-pointer text-sm truncate hover:bg-slate-50 transition-colors; }
        .note-item.active { @apply bg-indigo-600 text-white hover:bg-indigo-700; }
        input, textarea { @apply border border-slate-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-indigo-500; }
        button { @apply transition-colors duration-200; }
    </style>
</head>
<body class="flex h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">

    <div class="w-20 bg-indigo-800 flex flex-col items-center pt-6 shadow-xl z-20 shrink-0">
        <button class="sidebar-btn active" onclick="switchTab('calendar-tab', this)">
            <span class="text-2xl">📅</span> Calendar
        </button>
        <button class="sidebar-btn" onclick="switchTab('notes-tab', this)">
            <span class="text-2xl">📝</span> Notes
        </button>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        
        <div class="bg-white p-4 shadow-sm flex gap-4 items-center z-10 shrink-0">
            <input type="password" id="securePin" placeholder="Enter 4-Digit PIN" class="w-48 text-sm font-bold tracking-widest text-center">
            <button onclick="loadData()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md font-medium text-sm shadow-sm">
                ☁️ Load Workspace
            </button>
            <span id="statusText" class="text-sm font-semibold text-indigo-600 ml-auto"></span>
        </div>

        <div id="calendar-tab" class="flex-1 overflow-y-auto p-6 flex flex-col gap-6">
            <div class="flex gap-6 items-start">
                <div class="flex-1 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div id="calendar" class="min-h-[500px]"></div>
                </div>
                
                <div class="w-80 bg-white p-6 rounded-xl shadow-sm border border-slate-200 shrink-0">
                    <h3 id="formTitle" class="font-bold text-lg mb-4">Add Meeting</h3>
                    <div class="flex flex-col gap-3 text-sm">
                        <input type="text" id="evTitle" placeholder="Meeting Title">
                        <input type="text" id="evOrg" placeholder="Organization">
                        <input type="text" id="evLink" placeholder="Zoom/Teams Link">
                        
                        <div class="flex gap-2">
                            <input type="text" id="evId" placeholder="Meeting ID" class="flex-1 min-w-0">
                            <input type="text" id="evPass" placeholder="Password" class="flex-1 min-w-0">
                        </div>
                        
                        <label class="text-xs text-slate-500 font-semibold mt-1">Series Start Date</label>
                        <input type="date" id="evStartDate">
                        
                        <label class="text-xs text-slate-500 font-semibold mt-1">Series End Date <span class="font-normal">(Leave blank to repeat forever)</span></label>
                        <input type="date" id="evEndDate">
                        
                        <div class="flex gap-2">
                            <div class="flex-1 flex flex-col">
                                <label class="text-xs text-slate-500 font-semibold mb-1">Time</label>
                                <input type="time" id="evStartTime">
                            </div>
                            <div class="flex-1 flex flex-col">
                                <label class="text-xs text-slate-500 font-semibold mb-1">To</label>
                                <input type="time" id="evEndTime">
                            </div>
                        </div>
                        
                        <label class="text-xs text-slate-500 font-semibold mt-2">Repeats On</label>
                        <div class="flex gap-1 justify-between mb-2">
                            <label class="flex flex-col items-center cursor-pointer"><input type="checkbox" name="evDays" value="1" class="mb-1 text-xs">M</label>
                            <label class="flex flex-col items-center cursor-pointer"><input type="checkbox" name="evDays" value="2" class="mb-1 text-xs">T</label>
                            <label class="flex flex-col items-center cursor-pointer"><input type="checkbox" name="evDays" value="3" class="mb-1 text-xs">W</label>
                            <label class="flex flex-col items-center cursor-pointer"><input type="checkbox" name="evDays" value="4" class="mb-1 text-xs">T</label>
                            <label class="flex flex-col items-center cursor-pointer"><input type="checkbox" name="evDays" value="5" class="mb-1 text-xs">F</label>
                            <label class="flex flex-col items-center cursor-pointer"><input type="checkbox" name="evDays" value="6" class="mb-1 text-xs">S</label>
                            <label class="flex flex-col items-center cursor-pointer"><input type="checkbox" name="evDays" value="0" class="mb-1 text-xs">S</label>
                        </div>
                        
                        <div class="flex gap-2 mt-2">
                            <button onclick="saveEvent()" id="saveEventBtn" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 rounded-md">Add to Calendar</button>
                            <button onclick="deleteEvent()" id="deleteEventBtn" class="hide flex-1 bg-red-100 text-red-600 hover:bg-red-200 py-2 rounded-md font-medium">Delete</button>
                        </div>
                        <button onclick="resetEventForm()" id="cancelEditBtn" class="hide bg-slate-100 text-slate-600 hover:bg-slate-200 py-2 rounded-md font-medium mt-1">Cancel Edit</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="notes-tab" class="hide flex-1 flex p-6 gap-6 overflow-hidden">
            <div class="w-64 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden shrink-0">
                <div class="p-4 border-b border-slate-100">
                    <button onclick="createNewNote()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 rounded-md text-sm">
                        ➕ New Note
                    </button>
                </div>
                <div id="notesList" class="flex-1 overflow-y-auto"></div>
            </div>
            
            <div class="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col gap-4 min-w-0">
                <div class="flex gap-4 items-center">
                    <input type="text" id="noteTitle" placeholder="Note Title..." class="flex-1 text-lg font-bold border-none focus:ring-0 px-0">
                    <button id="deleteNoteBtn" onclick="deleteNote()" class="hide bg-red-100 text-red-600 hover:bg-red-200 px-3 py-2 rounded-md text-sm font-semibold">🗑️ Delete</button>
                    <button onclick="downloadNote()" class="bg-slate-100 text-slate-700 hover:bg-slate-200 px-3 py-2 rounded-md text-sm font-semibold">⬇️ Download</button>
                    <button onclick="saveNotesToCloud()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-semibold shadow-sm">☁️ Sync to Cloud</button>
                </div>
                <textarea id="noteContent" placeholder="Write your notes here..." class="flex-1 font-mono text-sm resize-none"></textarea>
            </div>
        </div>

    </div>

    <script>
        // State
        let workspace = { notes: [], events: [] };
        let activeNoteId = null;
        let calendar;
        let editingEventId = null; // Tracks if we are editing a calendar event

        window.onload = () => {
            if(localStorage.getItem('securePin')) document.getElementById('securePin').value = localStorage.getItem('securePin');
            initCalendar();
        };

        function switchTab(tabId, btn) {
            document.getElementById('calendar-tab').classList.add('hide');
            document.getElementById('notes-tab').classList.add('hide');
            document.querySelectorAll('.sidebar-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.remove('hide');
            btn.classList.add('active');
            if(tabId === 'calendar-tab') setTimeout(() => calendar.render(), 100);
        }

        function setStatus(msg) {
            const el = document.getElementById('statusText');
            el.innerText = msg;
            setTimeout(() => el.innerText = '', 3000);
        }

        // --- SECURE API INTEGRATION ---
        async function loadData() {
            const pin = document.getElementById('securePin').value;
            if(!pin) return alert("Please enter your PIN");

            localStorage.setItem('securePin', pin);
            setStatus("Loading Workspace...");

            try {
                const res = await fetch('/api/sync', {
                    headers: { 'x-pin': pin }
                });
                
                if(!res.ok) throw new Error("Wrong PIN");
                
                const data = await res.json();
                workspace = JSON.parse(data.files['workspace.json'].content);
                
                calendar.removeAllEvents();
                calendar.addEventSource(workspace.events);
                renderNotesList();
                if(workspace.notes.length > 0) openNote(workspace.notes[0].id);
                else createNewNote();
                
                setStatus("✅ Workspace Loaded");
            } catch(e) {
                setStatus("❌ Wrong PIN or Server Error");
            }
        }

        async function syncToGithub() {
            const pin = document.getElementById('securePin').value;
            setStatus("Syncing to Cloud...");

            try {
                const res = await fetch('/api/sync', {
                    method: 'POST',
                    headers: { 
                        'x-pin': pin,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(workspace) 
                });
                if(!res.ok) throw new Error("Sync Failed");
                setStatus("✅ Synced to Cloud");
            } catch(e) {
                setStatus("❌ Sync Failed");
            }
        }

        // --- CALENDAR LOGIC ---
        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridWeek',
                firstDay: 1, // Start week on Monday
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: workspace.events,
                eventClick: (info) => {
                    loadEventIntoForm(info);
                }
            });
            calendar.render();
        }

        function saveEvent() {
            const title = document.getElementById('evTitle').value;
            const startDate = document.getElementById('evStartDate').value;
            const endDate = document.getElementById('evEndDate').value;
            const startTime = document.getElementById('evStartTime').value;
            const endTime = document.getElementById('evEndTime').value;

            if(!title || !startDate || !startTime) return alert("Title, Series Start Date, and Time are required.");

            // Extract checked days
            const checkedCb = Array.from(document.querySelectorAll('input[name="evDays"]:checked'));
            const checkedDays = checkedCb.map(cb => parseInt(cb.value));

            // Create recurring event object
            const newEvent = {
                id: editingEventId || Date.now().toString(),
                title: title,
                startRecur: startDate,
                startTime: startTime,
                extendedProps: {
                    org: document.getElementById('evOrg').value,
                    link: document.getElementById('evLink').value,
                    meetingId: document.getElementById('evId').value,
                    password: document.getElementById('evPass').value,
                    // Save raw form values so we can easily edit them later
                    rawStartDate: startDate,
                    rawEndDate: endDate,
                    rawStartTime: startTime,
                    rawEndTime: endTime,
                    rawDays: checkedDays 
                }
            };

            // Add optional fields only if they exist
            if(endDate) newEvent.endRecur = endDate;
            if(endTime) newEvent.endTime = endTime;
            if(checkedDays.length > 0) newEvent.daysOfWeek = checkedDays;

            // Remove old version if updating
            if (editingEventId) {
                workspace.events = workspace.events.filter(e => e.id !== editingEventId);
                const oldEv = calendar.getEventById(editingEventId);
                if (oldEv) oldEv.remove();
            }

            workspace.events.push(newEvent);
            calendar.addEvent(newEvent);
            syncToGithub();
            
            resetEventForm();
        }

        function loadEventIntoForm(info) {
            const ev = info.event;
            const props = ev.extendedProps;
            editingEventId = ev.id;
            
            document.getElementById('formTitle').innerText = "Edit Meeting";
            document.getElementById('evTitle').value = ev.title;
            document.getElementById('evOrg').value = props.org || '';
            document.getElementById('evLink').value = props.link || '';
            document.getElementById('evId').value = props.meetingId || '';
            document.getElementById('evPass').value = props.password || '';
            
            // Load dates and times from our hidden raw data
            document.getElementById('evStartDate').value = props.rawStartDate || '';
            document.getElementById('evEndDate').value = props.rawEndDate || '';
            document.getElementById('evStartTime').value = props.rawStartTime || '';
            document.getElementById('evEndTime').value = props.rawEndTime || '';

            // Check the boxes
            const days = props.rawDays || [];
            document.querySelectorAll('input[name="evDays"]').forEach(cb => {
                cb.checked = days.includes(parseInt(cb.value));
            });

            // Update UI buttons
            document.getElementById('saveEventBtn').innerText = "Update";
            document.getElementById('deleteEventBtn').classList.remove('hide');
            document.getElementById('cancelEditBtn').classList.remove('hide');
        }

        function deleteEvent() {
            if (!editingEventId) return;
            if (!confirm("Are you sure you want to delete this series?")) return;

            workspace.events = workspace.events.filter(e => e.id !== editingEventId);
            const oldEv = calendar.getEventById(editingEventId);
            if (oldEv) oldEv.remove();

            syncToGithub();
            resetEventForm();
        }

        function resetEventForm() {
            editingEventId = null;
            document.getElementById('formTitle').innerText = "Add Meeting";
            ['evTitle','evOrg','evLink','evId','evPass','evStartDate','evEndDate','evStartTime','evEndTime'].forEach(id => document.getElementById(id).value = '');
            document.querySelectorAll('input[name="evDays"]').forEach(cb => cb.checked = false);
            
            document.getElementById('saveEventBtn').innerText = "Add to Calendar";
            document.getElementById('deleteEventBtn').classList.add('hide');
            document.getElementById('cancelEditBtn').classList.add('hide');
        }

        // --- NOTES LOGIC ---
        function renderNotesList() {
            const list = document.getElementById('notesList');
            list.innerHTML = '';
            workspace.notes.forEach(note => {
                const div = document.createElement('div');
                div.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
                div.innerText = note.title || "Untitled";
                div.onclick = () => openNote(note.id);
                list.appendChild(div);
            });
        }

        function openNote(id) {
            saveCurrentEditorState();
            activeNoteId = id;
            const note = workspace.notes.find(n => n.id === id);
            document.getElementById('noteTitle').value = note.title;
            document.getElementById('noteContent').value = note.content;
            document.getElementById('deleteNoteBtn').classList.remove('hide');
            renderNotesList();
        }

        function createNewNote() {
            saveCurrentEditorState();
            activeNoteId = Date.now().toString();
            workspace.notes.unshift({ id: activeNoteId, title: 'New Note', content: '' });
            openNote(activeNoteId);
        }

        function saveCurrentEditorState() {
            if(!activeNoteId) return;
            const note = workspace.notes.find(n => n.id === activeNoteId);
            if(note) {
                note.title = document.getElementById('noteTitle').value;
                note.content = document.getElementById('noteContent').value;
            }
        }

        function saveNotesToCloud() {
            saveCurrentEditorState();
            renderNotesList();
            syncToGithub();
        }

        function deleteNote() {
            if(!confirm("Delete note?")) return;
            workspace.notes = workspace.notes.filter(n => n.id !== activeNoteId);
            activeNoteId = null;
            if(workspace.notes.length > 0) openNote(workspace.notes[0].id);
            else createNewNote();
            syncToGithub();
        }

        function downloadNote() {
            const title = document.getElementById('noteTitle').value || 'Note';
            const content = document.getElementById('noteContent').value;
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.download = `${title}.txt`;
            a.href = URL.createObjectURL(blob);
            a.click();
        }
    </script>
</body>
</html>
