<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workspace Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        .hide { display: none !important; }
        .sidebar-btn { @apply flex flex-col items-center justify-center gap-1 w-full h-full md:py-4 text-xs font-semibold text-indigo-300 hover:text-white hover:bg-white/10 transition-colors; }
        .sidebar-btn.active { @apply text-white border-t-4 md:border-t-0 md:border-l-4 border-white bg-white/10; }
        #meetingFormDrawer { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">

    <div id="meetingModal" class="hide fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6">
            <h2 id="modalTitle" class="text-xl font-bold"></h2>
            <p id="modalOrg" class="text-indigo-600 font-semibold mb-2"></p>
            <p id="modalRemarks" class="text-sm italic text-slate-600 mb-4"></p>
            <button id="modalJoinBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mb-4">Join Meeting</button>
            <div class="text-sm space-y-1 mb-6">
                <p>ID: <span id="modalId" class="font-mono font-bold"></span></p>
                <p>Pass: <span id="modalPass" class="font-mono font-bold"></span></p>
            </div>
            <div class="flex gap-2">
                <button onclick="closeMeetingModal()" class="flex-1 bg-slate-100 py-2 rounded">Close</button>
                <button id="modalEditBtn" class="flex-1 bg-indigo-100 text-indigo-700 py-2 rounded">✏️ Edit</button>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden order-1 md:order-2">
        <div class="bg-white p-3 shadow-sm flex gap-2 items-center shrink-0">
            <input type="password" id="securePin" placeholder="4-Digit PIN" class="w-24 text-sm text-center border rounded">
            <button onclick="loadData()" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm font-bold">☁️ Load</button>
            <span id="statusText" class="text-xs text-indigo-600 ml-auto"></span>
        </div>

        <div id="calendar-tab" class="flex-1 relative overflow-hidden flex flex-col">
            <div class="flex p-3 gap-2 shrink-0 bg-slate-100">
                <button onclick="toggleForm()" class="bg-indigo-600 text-white px-4 py-1.5 rounded text-sm font-bold shadow">+ Add Meeting</button>
                <button onclick="exportCalendarToCSV()" class="text-emerald-700 border border-emerald-700 px-3 py-1 rounded text-sm">📊 Export</button>
            </div>
            <div id="calendar" class="flex-1 p-2 bg-white"></div>
            
            <div id="meetingFormDrawer" class="absolute top-0 right-0 h-full w-full md:w-80 bg-white z-40 p-6 overflow-y-auto translate-x-full border-l shadow-2xl">
                <div class="flex justify-between mb-6"><h3 id="formTitle" class="font-bold text-lg">Add Meeting</h3><button onclick="toggleForm()" class="text-xl">✕</button></div>
                <div class="flex flex-col gap-3 text-sm">
                    <input type="text" id="evTitle" placeholder="Title">
                    <input type="text" id="evOrg" placeholder="Org">
                    <input type="text" id="evLink" placeholder="Link">
                    <input type="text" id="evId" placeholder="ID">
                    <input type="text" id="evPass" placeholder="Password">
                    <textarea id="evRemarks" placeholder="Remarks..." class="h-20 border p-2"></textarea>
                    <label class="flex items-center gap-2 font-semibold">
                        <input type="checkbox" id="evAlarm" class="w-4 h-4"> Enable 5-min Reminder
                    </label>
                    <input type="date" id="evStartDate">
                    <div class="flex gap-2"><input type="time" id="evStartTime" class="flex-1"><input type="time" id="evEndTime" class="flex-1"></div>
                    <button onclick="saveEvent()" id="saveEventBtn" class="bg-indigo-600 text-white py-2 rounded">Save</button>
                </div>
            </div>
        </div>

        <div id="notes-tab" class="hide flex-1 flex flex-col p-4 gap-4">
            <div class="flex gap-2">
                <button onclick="createNewNote()" class="bg-slate-100 px-4 py-2 rounded text-sm">➕ New</button>
                <button onclick="saveNotesToCloud()" class="bg-indigo-600 text-white px-4 py-2 rounded text-sm">☁️ Sync</button>
            </div>
            <div id="notesList" class="flex flex-wrap gap-2"></div>
            <input type="text" id="noteTitle" placeholder="Title" class="border p-2">
            <textarea id="noteContent" class="flex-1 border p-2 font-mono"></textarea>
        </div>
    </div>

    <div class="w-full h-16 md:w-20 md:h-full bg-indigo-800 flex flex-row md:flex-col items-center justify-around z-50 shrink-0 order-2 md:order-1">
        <button class="sidebar-btn active" onclick="switchTab('calendar-tab', this)">📅</button>
        <button class="sidebar-btn" onclick="switchTab('notes-tab', this)">📝</button>
    </div>

    <script>
        let workspace = { notes: [], events: [] };
        let activeNoteId = null;
        let calendar, editingEventId = null;

        function toggleForm() { document.getElementById('meetingFormDrawer').classList.toggle('translate-x-full'); }
        function switchTab(id, btn) {
            document.getElementById('calendar-tab').classList.add('hide'); document.getElementById('notes-tab').classList.add('hide');
            document.querySelectorAll('.sidebar-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.remove('hide'); btn.classList.add('active');
            if(id === 'calendar-tab') calendar.render();
        }

        async function loadData() {
            const pin = document.getElementById('securePin').value;
            localStorage.setItem('securePin', pin);
            try {
                const res = await fetch('/api/sync', { headers: {'x-pin': pin} });
                const data = await res.json();
                workspace = JSON.parse(data.files['workspace.json'].content);
                calendar.removeAllEvents(); calendar.addEventSource(workspace.events);
                renderNotesList();
                document.getElementById('statusText').innerText = "✅ Loaded";
                Notification.requestPermission();
            } catch(e) { document.getElementById('statusText').innerText = "❌ Error"; }
        }

        async function syncToGithub() {
            const pin = document.getElementById('securePin').value;
            await fetch('/api/sync', { method: 'POST', headers: {'x-pin': pin, 'Content-Type': 'application/json'}, body: JSON.stringify(workspace) });
            document.getElementById('statusText').innerText = "✅ Synced";
        }

        // Alarm Monitor
        setInterval(() => {
            const now = new Date();
            const currentMin = now.getHours() * 60 + now.getMinutes();
            workspace.events.forEach(ev => {
                if(ev.extendedProps?.alarmEnabled) {
                    const [h, m] = ev.startTime.split(':').map(Number);
                    if((h * 60 + m) - currentMin === 5) {
                        new Notification("Reminder", { body: `Meeting in 5 mins: ${ev.title}` });
                    }
                }
            });
        }, 60000);

        function saveEvent() {
            const newEvent = {
                id: editingEventId || Date.now().toString(),
                title: document.getElementById('evTitle').value,
                startRecur: document.getElementById('evStartDate').value,
                startTime: document.getElementById('evStartTime').value,
                extendedProps: {
                    org: document.getElementById('evOrg').value, link: document.getElementById('evLink').value,
                    meetingId: document.getElementById('evId').value, password: document.getElementById('evPass').value,
                    remarks: document.getElementById('evRemarks').value,
                    alarmEnabled: document.getElementById('evAlarm').checked
                }
            };
            workspace.events.push(newEvent); calendar.addEvent(newEvent); syncToGithub(); toggleForm();
        }

        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: window.innerWidth < 768 ? 'timeGridDay' : 'timeGridWeek',
                headerToolbar: { left: 'prev,next', center: 'title', right: '' },
                events: workspace.events,
                eventContent: arg => ({ html: `<div class="font-bold text-xs p-1">${arg.event.title}</div>` }),
                eventClick: info => { 
                    const p = info.event.extendedProps;
                    document.getElementById('modalTitle').innerText = info.event.title;
                    document.getElementById('modalRemarks').innerText = p.remarks || '';
                    document.getElementById('modalJoinBtn').onclick = () => window.open(p.link, '_blank');
                    document.getElementById('modalId').innerText = p.meetingId || 'N/A';
                    document.getElementById('modalPass').innerText = p.password || 'N/A';
                    document.getElementById('meetingModal').classList.remove('hide');
                }
            });
            calendar.render();
        }

        initCalendar();
        renderNotesList();
    </script>
</body>
</html>
